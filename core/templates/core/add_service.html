<!DOCTYPE html>
<html>
<head>
    <title>Book Service</title>
</head>
<body>
    <h2>Book Bike Service</h2>

    <form method="post">
        {% csrf_token %}

        <label>Select Bike:</label><br>
        <select name="bike">
            {% for bike in bikes %}
                <option value="{{ bike.id }}">{{ bike }}</option>
            {% endfor %}
        </select><br><br>

        <label>Problem Description:</label><br>
        <textarea name="problem"></textarea><br><br>

        <button type="submit">Submit Request</button>
    </form>

    <br>
    <a href="/">Back to Home</a>
</body>
</html>
