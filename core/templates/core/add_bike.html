{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BikeHub | Add Bike</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>
:root{
    --primary:#22c55e;
    --accent:#3b82f6;
    --light-bg:#f8fafc;
}

html,body{
    height:100%;
    margin:0;
    font-family:'Poppins',sans-serif;
    background:var(--light-bg);
    background-image:
        radial-gradient(circle at top right,#dbeafe,transparent 40%),
        radial-gradient(circle at bottom left,#dcfce7,transparent 40%);
}

/* ===== BACK LINK ===== */
.back-link{
    position:fixed;
    top:22px;
    left:22px;
    text-decoration:none;
    font-weight:600;
    color:#475569;
    display:flex;
    gap:8px;
    align-items:center;
    transition:.3s;
}

.back-link:hover{
    color:var(--primary);
    transform:translateX(-4px);
}

/* ===== CENTER WRAPPER ===== */
.page-container{
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

/* ===== CARD ===== */
.form-card{
    width:100%;
    max-width:420px;
    background:white;
    border-radius:24px;
    padding:36px 30px;
    box-shadow:0 30px 60px rgba(0,0,0,.12);
    text-align:center;
    animation:fadeUp .6s ease forwards;
}

@keyframes fadeUp{
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;transform:translateY(0);}
}

/* ===== LOGO ===== */
.logo img{
    width:55px;
    margin-bottom:14px;
}

/* ===== TEXT ===== */
h2{
    font-size:26px;
    font-weight:700;
}

.gradient-text{
    background:linear-gradient(90deg,#22c55e,#3b82f6);
    background-clip:text;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{
    font-size:14px;
    color:#64748b;
    margin:8px 0 26px;
}

/* ===== INPUTS ===== */
label{
    font-size:12px;
    font-weight:600;
    color:#64748b;
    display:block;
    text-align:left;
    margin-bottom:4px;
}

input{
    width:100%;
    padding:14px 16px;
    margin-bottom:18px;
    border-radius:14px;
    border:none;
    background:#f1f5f9;
    transition:.2s;
}

input:focus{
    outline:none;
    background:white;
    box-shadow:0 0 0 2px rgba(34,197,94,.3);
}

/* ===== BUTTON ===== */
.btn-main{
    width:100%;
    padding:14px;
    border-radius:999px;
    border:none;
    font-weight:600;
    background:linear-gradient(90deg,#22c55e,#3b82f6);
    color:white;
    transition:.3s;
}

.btn-main:hover{
    transform:scale(1.05);
    box-shadow:0 12px 25px rgba(59,130,246,.3);
}
</style>
</head>

<body>

<a href="{% url 'client_dashboard' %}" class="back-link">
    <i class="fa-solid fa-arrow-left"></i> Dashboard
</a>

<div class="page-container">

<div class="form-card">

    <div class="logo">
        <img src="{% static 'images/logo.svg' %}" alt="BikeHub">
    </div>

    <h2>Add <span class="gradient-text">Bike</span></h2>
    <p class="subtitle">Enter your machine details</p>

    <form method="post">
        {% csrf_token %}

        <label>BIKE MODEL</label>
        <input type="text" name="bike_name" placeholder="e.g. Yamaha R15 V4" required>

        <label>REGISTRATION NUMBER</label>
        <input type="text" name="bike_number" placeholder="e.g. TN 01 AB 1234" required>

        <button type="submit" class="btn-main mt-2">
            <i class="fa-solid fa-plus me-2"></i>
            Register Bike
        </button>
    </form>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
