{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BikeHub | Book Service</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<style>
:root{
    --primary:#22c55e;
    --accent:#3b82f6;
}

html,body{
    height:100%;
    margin:0;
    font-family:'Poppins',sans-serif;
    overflow:hidden;
}

/* ===== VIDEO BACKGROUND ===== */
.video-wrapper{
    position:fixed;
    inset:0;
    z-index:-2;
}

.video-wrapper video{
    width:100%;
    height:100%;
    object-fit:cover;
    filter:brightness(0.75);
}

.video-overlay{
    position:absolute;
    inset:0;
    background:
    radial-gradient(circle at top right,#dbeafe,transparent 40%),
    radial-gradient(circle at bottom left,#dcfce7,transparent 40%),
    rgba(255,255,255,0.75);
}

/* ===== BACK LINK ===== */
.back-link{
    position:fixed;
    top:20px;
    left:24px;
    text-decoration:none;
    font-weight:600;
    color:#475569;
    z-index:5;
    transition:.2s;
}

.back-link:hover{
    color:var(--primary);
    transform:translateX(-3px);
}

/* ===== CENTER WRAPPER ===== */
.page-wrapper{
    position:relative;
    z-index:2;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 16px;
}

/* ===== CARD ===== */
.service-card{
    width:100%;
    max-width:450px;
    background:white;
    border-radius:24px;
    padding:38px 32px;
    box-shadow:0 30px 60px rgba(0,0,0,.15);
    text-align:center;
    animation:fadeUp .6s ease forwards;
}

@keyframes fadeUp{
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;transform:translateY(0);}
}

/* ===== LOGO ===== */
.logo{
    width:60px;
    margin-bottom:16px;
}

/* ===== TEXT ===== */
h2{
    font-weight:700;
    margin-bottom:6px;
}

h2 span{
    background: linear-gradient(90deg,#22c55e,#3b82f6);
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
}


.subtitle{
    font-size:14px;
    color:#64748b;
    margin-bottom:26px;
}

/* ===== INPUTS ===== */
.form-control,
.form-select,
textarea{
    background:#f1f5f9;
    border:none;
    border-radius:14px;
    padding:12px 14px;
}

.form-control:focus,
.form-select:focus,
textarea:focus{
    outline:none;
    box-shadow:0 0 0 2px rgba(34,197,94,.3);
    background:white;
}

/* ===== BUTTON ===== */
.btn-main{
    background:linear-gradient(90deg,#22c55e,#3b82f6);
    border:none;
    color:white;
    font-weight:600;
    padding:14px;
    border-radius:30px;
    width:100%;
    margin-top:22px;
    transition:.3s;
}

.btn-main:hover{
    transform:scale(1.05);
    box-shadow:0 12px 25px rgba(59,130,246,.3);
}

/* MOBILE */
@media(max-width:480px){
    .service-card{
        padding:28px 20px;
    }
}
</style>
</head>

<body>

<div class="video-wrapper">
    <video autoplay muted loop playsinline>
        <source src="{% static 'videos/bike_login.mp4' %}" type="video/mp4">
    </video>
    <div class="video-overlay"></div>
</div>

<a href="{% url 'client_dashboard' %}" class="back-link">
    <i class="fa-solid fa-arrow-left me-2"></i> Dashboard
</a>

<div class="page-wrapper">

<div class="service-card">

    <img src="{% static 'images/logo.svg' %}" class="logo" alt="BikeHub">

    <h2>Book <span>Service</span></h2>
    <p class="subtitle">Schedule professional service for your bike</p>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3 text-start">
            <label class="form-label">Select Bike</label>
            <select name="bike" class="form-select" required>
                {% for bike in bikes %}
                    <option value="{{ bike.id }}">
                        {{ bike.bike_name }} ({{ bike.bike_number }})
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3 text-start">
            <label class="form-label">Problem Description</label>
            <textarea name="problem" rows="4" class="form-control"
                      placeholder="Describe the issue..." required></textarea>
        </div>

        <button type="submit" class="btn-main">
            <i class="fa-solid fa-calendar-check me-2"></i>
            Book Service
        </button>
    </form>

</div>

</div>

</body>
</html>
