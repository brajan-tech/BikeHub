{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BikeHub | Leave Feedback</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{ --primary:#22c55e; --accent:#3b82f6; --light-bg:#f8fafc; }
body{ font-family:'Poppins',sans-serif; background:var(--light-bg); background-image:radial-gradient(circle at top right,#dbeafe,transparent 40%),radial-gradient(circle at bottom left,#dcfce7,transparent 40%); color:#0f172a; min-height:100vh; }
.navbar{ background:white; box-shadow:0 4px 20px rgba(0,0,0,.05); }
.dash-header{ margin:40px 0; text-align:center; }
.dash-title h1{ font-size:2.2rem; font-weight:800; }
.gradient-text{ background: linear-gradient(90deg,#22c55e,#3b82f6); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; color: transparent; }
.feedback-box { background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); border-radius: 20px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 600px; margin: 0 auto; text-align: center; }
.rating { display: flex; flex-direction: row-reverse; justify-content: center; gap: 10px; margin: 20px 0; }
.rating input { display: none; }
.rating label { font-size: 40px; color: #cbd5e1; cursor: pointer; transition: 0.3s; }
.rating input:checked ~ label, .rating label:hover, .rating label:hover ~ label { color: #eab308; }
.form-control { border-radius: 12px; padding: 15px; border: 1px solid #e2e8f0; background: #f8fafc; }
.btn-submit { background: linear-gradient(90deg,#22c55e,#3b82f6); color: white; border: none; padding: 12px 30px; border-radius: 12px; font-weight: 600; width: 100%; margin-top: 20px; transition: 0.3s; }
.btn-submit:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(59,130,246,0.3); }
</style>
</head>
<body>
<nav class="navbar navbar-expand-lg">
<div class="container d-flex justify-content-between">
<a class="navbar-brand" href="#"><img src="{% static 'images/logo.svg' %}" style="width:45px;" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1048/1048313.png'"></a>
<a href="{% url 'client_dashboard' %}" class="btn btn-sm btn-outline-secondary rounded-pill px-3">Back to Dashboard</a>
</div>
</nav>

<div class="container">
    <div class="dash-header">
        <div class="dash-title">
            <h1>Rate Your <span class="gradient-text">Experience</span></h1>
            <p class="text-muted">Service for {{ service.bike.bike_name }}</p>
        </div>
    </div>
    
    <div class="feedback-box">
        <form method="POST">
            {% csrf_token %}
            <h4>How was our service?</h4>
            <div class="rating">
                <input type="radio" name="rating" value="5" id="5"><label for="5"><i class="fa-solid fa-star"></i></label>
                <input type="radio" name="rating" value="4" id="4"><label for="4"><i class="fa-solid fa-star"></i></label>
                <input type="radio" name="rating" value="3" id="3"><label for="3"><i class="fa-solid fa-star"></i></label>
                <input type="radio" name="rating" value="2" id="2"><label for="2"><i class="fa-solid fa-star"></i></label>
                <input type="radio" name="rating" value="1" id="1" required><label for="1"><i class="fa-solid fa-star"></i></label>
            </div>
            
            <textarea name="comment" class="form-control mt-3" rows="4" placeholder="Tell us what you liked about the service..." required></textarea>
            
            <button type="submit" class="btn-submit">Submit Review</button>
        </form>
    </div>
</div>
</body>
</html>
