{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BikeHub | My Bikes</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<style>
:root{
    --primary:#22c55e;
    --accent:#3b82f6;
    --light-bg:#f8fafc;
}

body{
    font-family:'Poppins',sans-serif;
    background:var(--light-bg);
    background-image:
        radial-gradient(circle at top right,#dbeafe,transparent 40%),
        radial-gradient(circle at bottom left,#dcfce7,transparent 40%);
    color:#0f172a;
    min-height:100vh;
}

/* ===== GRADIENT TEXT ===== */
.gradient-text{
    background:linear-gradient(90deg,#22c55e,#3b82f6);
    background-clip:text;              /* standard */
    -webkit-background-clip:text;      /* safari support */
    -webkit-text-fill-color:transparent;
    color:transparent;
}



/* ===== HEADER ===== */
.page-title{
    font-weight:700;
}

/* ===== CARD ===== */
.bike-card{
    background:white;
    border-radius:22px;
    padding:28px;
    transition:.3s;
    height:100%;
    box-shadow:0 20px 40px rgba(0,0,0,.08);
}

.bike-card:hover{
    transform:translateY(-6px);
}

/* ===== HISTORY BUTTON ===== */
.btn-history{
    border-radius:999px;
    padding:10px 22px;
    font-weight:600;
    border:1px solid var(--accent);
    color:var(--accent);
    background:rgba(59,130,246,.1);
    transition:.3s;
    text-decoration:none;
    display:inline-block;
}

.btn-history:hover{
    background:var(--accent);
    color:#fff;
}

/* ===== BACK BUTTON ===== */
.btn-back{
    border-radius:999px;
    padding:6px 18px;
    font-weight:500;
}
</style>
</head>

<body>

<div class="container py-5 animate__animated animate__fadeInUp">

<!-- HEADER -->
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h2 class="page-title">
            My <span class="gradient-text">Bikes</span>
        </h2>
        <p class="text-muted mb-0">View all your registered bikes</p>
    </div>

    <a href="{% url 'client_dashboard' %}" class="btn btn-outline-secondary btn-back">
        ← Back to Dashboard
    </a>
</div>

<!-- BIKE LIST -->
<div class="row g-4">

{% for bike in bikes %}
<div class="col-lg-4 col-md-6">

    <div class="bike-card">

        <h5 class="fw-bold mb-2">
            <i class="fa-solid fa-motorcycle me-2 text-success"></i>
            {{ bike.bike_name }}
        </h5>

        <p class="text-muted mb-4">
            {{ bike.bike_number }}
        </p>

        <a href="{% url 'client_bike_history' bike.id %}" class="btn-history">
            <i class="fa-solid fa-clock-rotate-left me-1"></i>
            View History
        </a>

    </div>

</div>
{% empty %}
<div class="col-12 text-center text-muted">
    No bikes found.
</div>
{% endfor %}

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
