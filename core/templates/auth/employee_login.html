{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BikeHub | Employee Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
:root{
    --primary:#22c55e;
    --accent:#3b82f6;
}

html,body{
    height:100%;
    margin:0;
    font-family:'Poppins',sans-serif;
    overflow:hidden;
}

/* ===== VIDEO BACKGROUND ===== */
.video-wrapper{
    position:fixed;
    inset:0;
    z-index:-2;
}

.video-wrapper video{
    width:100%;
    height:100%;
    object-fit:cover;
    filter:brightness(0.75);
}

.video-overlay{
    position:absolute;
    inset:0;
    background:
    radial-gradient(circle at top right,#dbeafe,transparent 40%),
    radial-gradient(circle at bottom left,#dcfce7,transparent 40%),
    rgba(255,255,255,0.75);
}

/* ===== BACK LINK ===== */
.back-link{
    position:fixed;
    top:20px;
    left:20px;
    text-decoration:none;
    font-weight:600;
    color:#475569;
    z-index:5;
}

.back-link:hover{
    color:var(--primary);
}

/* ===== CENTER WRAPPER ===== */
.page-container{
    position:relative;
    z-index:2;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

/* ===== CARD ===== */
.login-card{
    width:100%;
    max-width:420px;
    background:white;
    border-radius:24px;
    padding:40px 30px;
    text-align:center;
    box-shadow:0 30px 60px rgba(0,0,0,.15);
    transition:.3s ease;
}

.login-card:hover{
    transform:translateY(-5px);
}

/* ===== LOGO ===== */
.logo{
    width:60px;
    margin-bottom:18px;
}

/* ===== TEXT ===== */
h2{
    font-weight:700;
    margin-bottom:6px;
}

h2 span{
    background:linear-gradient(90deg,#22c55e,#3b82f6);
    background-clip:text;
    -webkit-background-clip:text;
    color:transparent;
}

.subtitle{
    font-size:14px;
    color:#64748b;
    margin-bottom:24px;
}

/* ===== INPUT GROUP ===== */
.input-group{
    position:relative;
    margin-bottom:18px;
}

.form-control{
    background:#f1f5f9;
    border:none;
    border-radius:14px;
    padding:14px 44px 14px 16px;
}

.form-control:focus{
    outline:none;
    box-shadow:0 0 0 2px rgba(34,197,94,.3);
    background:white;
}

.input-group i{
    position:absolute;
    right:16px;
    top:50%;
    transform:translateY(-50%);
    color:var(--primary);
}

/* ===== BUTTON ===== */
.login-btn{
    width:100%;
    padding:14px;
    border-radius:999px;
    border:none;
    font-weight:600;
    background:linear-gradient(90deg,#22c55e,#3b82f6);
    color:white;
    transition:.3s;
}

.login-btn:hover{
    transform:scale(1.05);
    box-shadow:0 12px 25px rgba(59,130,246,.3);
}

/* MOBILE */
@media(max-width:480px){
    .login-card{
        padding:30px 20px;
    }
}
</style>
</head>

<body>

<div class="video-wrapper">
    <video autoplay muted loop playsinline>
        <source src="{% static 'videos/bike_login.mp4' %}" type="video/mp4">
    </video>
    <div class="video-overlay"></div>
</div>

<a href="{% url 'select_login' %}" class="back-link">
    ← Back
</a>

<div class="page-container">

<div class="login-card">

    <img src="{% static 'images/logo.svg' %}" class="logo">

    <h2><span>Employee</span> Login</h2>
    <p class="subtitle">Access your service dashboard</p>

    <form method="post">
        {% csrf_token %}

        <div class="input-group">
            <input name="username" class="form-control" placeholder="Username" required>
            <i class="fa-solid fa-user"></i>
        </div>

        <div class="input-group">
            <input name="password" type="password" class="form-control" placeholder="Password" required>
            <i class="fa-solid fa-lock"></i>
        </div>

        <button type="submit" class="login-btn">
            Login to Dashboard
        </button>
    </form>

</div>

</div>

</body>
</html>
