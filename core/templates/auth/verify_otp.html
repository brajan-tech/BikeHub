{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BikeHub | Verify Email</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
:root{
    --primary:#22c55e;
    --accent:#3b82f6;
}

html,body{
    height:100%;
    margin:0;
    font-family:'Poppins',sans-serif;
    overflow:hidden;
}

/* ===== VIDEO BACKGROUND ===== */
.video-wrapper{
    position:fixed;
    inset:0;
    z-index:-2;
}

.video-wrapper video{
    width:100%;
    height:100%;
    object-fit:cover;
    filter:brightness(0.75);
}

.video-overlay{
    position:absolute;
    inset:0;
    background:
    radial-gradient(circle at top right,#dbeafe,transparent 40%),
    radial-gradient(circle at bottom left,#dcfce7,transparent 40%),
    rgba(255,255,255,0.75);
}

/* ===== CENTER WRAPPER ===== */
.page-container{
    position:relative;
    z-index:2;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

/* ===== CARD ===== */
.card-box{
    width:100%;
    max-width:380px;
    background:white;
    border-radius:24px;
    padding:36px 28px;
    box-shadow:0 30px 60px rgba(0,0,0,.15);
    text-align:center;
    animation:fadeUp .6s ease forwards;
}

@keyframes fadeUp{
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;transform:translateY(0);}
}

/* ===== LOGO ===== */
.logo{
    width:60px;
    margin-bottom:14px;
}

/* ===== TEXT ===== */
h2{
    font-weight:700;
    margin-bottom:6px;
}

h2 span{
    background:linear-gradient(90deg,#22c55e,#3b82f6);
    background-clip:text;
    -webkit-background-clip:text;
    color:transparent;
}

.subtitle{
    font-size:14px;
    color:#64748b;
    margin-bottom:22px;
}

/* ===== OTP INPUT ===== */
.form-control{
    background:#f1f5f9;
    border:none;
    border-radius:14px;
    padding:16px;
    margin-bottom:18px;
    text-align:center;
    font-size:20px;
    letter-spacing:6px;
}

.form-control:focus{
    outline:none;
    box-shadow:0 0 0 2px rgba(34,197,94,.3);
    background:white;
}

/* ===== VERIFY BUTTON ===== */
.btn-verify{
    width:100%;
    border-radius:999px;
    padding:14px;
    font-weight:600;
    border:none;
    background:linear-gradient(90deg,#22c55e,#3b82f6);
    color:white;
    transition:.3s;
}

.btn-verify:hover{
    transform:scale(1.05);
    box-shadow:0 12px 25px rgba(59,130,246,.3);
}

/* ===== RESEND ===== */
.resend-btn{
    background:none;
    border:none;
    color:var(--accent);
    font-size:14px;
    margin-top:14px;
    cursor:pointer;
}

.resend-btn:hover{
    text-decoration:underline;
}

/* ===== FOOTER ===== */
.footer{
    margin-top:18px;
    font-size:14px;
    color:#64748b;
}

.footer span{
    color:var(--accent);
}

/* ALERT FIX */
.alert{
    border-radius:12px;
}
</style>
</head>

<body>

<div class="video-wrapper">
    <video autoplay muted loop playsinline>
        <source src="{% static 'videos/bike_login.mp4' %}" type="video/mp4">
    </video>
    <div class="video-overlay"></div>
</div>

<div class="page-container">

<div class="card-box">

    <img src="{% static 'images/logo.svg' %}" class="logo">

    <h2>Email <span>Verification</span></h2>
    <p class="subtitle">
        Enter the 6-digit OTP sent to your email
    </p>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-danger py-2">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <input
            name="otp"
            class="form-control"
            placeholder="••••••"
            maxlength="6"
            required
        >

        <button class="btn-verify" type="submit">
            Verify & Continue
        </button>

        <button
            type="submit"
            name="resend_otp"
            class="resend-btn"
            formnovalidate>
            Resend OTP
        </button>
    </form>

    <div class="footer">
        Didn’t receive OTP? <br>
        <span>Check spam or try again</span>
    </div>

</div>

</div>

</body>
</html>
