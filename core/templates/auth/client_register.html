{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BikeHub | Client Registration</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
:root{
    --primary:#22c55e;
    --accent:#3b82f6;
}

html,body{
    height:100%;
    margin:0;
    font-family:'Poppins',sans-serif;
    overflow:hidden;
}

/* ===== VIDEO BACKGROUND ===== */
.video-wrapper{
    position:fixed;
    inset:0;
    z-index:-2;
}

.video-wrapper video{
    width:100%;
    height:100%;
    object-fit:cover;
    filter:brightness(0.75);
}

.video-overlay{
    position:absolute;
    inset:0;
    background:
    radial-gradient(circle at top right,#dbeafe,transparent 40%),
    radial-gradient(circle at bottom left,#dcfce7,transparent 40%),
    rgba(255,255,255,0.75);
}

/* ===== BACK LINK ===== */
.back-link{
    position:fixed;
    top:20px;
    left:20px;
    text-decoration:none;
    font-weight:600;
    color:#475569;
    z-index:5;
}

.back-link:hover{
    color:var(--primary);
}

/* ===== CENTER WRAPPER ===== */
.page-container{
    position:relative;
    z-index:2;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

/* ===== CARD ===== */
.card-box{
    width:100%;
    max-width:400px;
    background:white;
    border-radius:24px;
    padding:36px 28px;
    box-shadow:0 30px 60px rgba(0,0,0,.15);
    text-align:center;
    animation:fadeUp .6s ease forwards;
}

@keyframes fadeUp{
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;transform:translateY(0);}
}

/* ===== LOGO ===== */
.logo{
    width:60px;
    margin-bottom:14px;
}

/* ===== TEXT ===== */
h2{
    font-weight:700;
    margin-bottom:6px;
}

h2 span{
    background:linear-gradient(90deg,#22c55e,#3b82f6);
    background-clip:text;
    -webkit-background-clip:text;
    color:transparent;
}

.subtitle{
    font-size:14px;
    color:#64748b;
    margin-bottom:22px;
}

/* ===== INPUTS ===== */
.form-control{
    background:#f1f5f9;
    border:none;
    border-radius:14px;
    padding:14px;
    margin-bottom:16px;
}

.form-control:focus{
    outline:none;
    box-shadow:0 0 0 2px rgba(34,197,94,.3);
    background:white;
}

/* ===== BUTTON ===== */
.btn-register{
    width:100%;
    border-radius:999px;
    padding:14px;
    font-weight:600;
    border:none;
    background:linear-gradient(90deg,#22c55e,#3b82f6);
    color:white;
    transition:.3s;
}

.btn-register:hover{
    transform:scale(1.05);
    box-shadow:0 12px 25px rgba(59,130,246,.3);
}

/* ===== FOOTER ===== */
.footer{
    margin-top:18px;
    font-size:14px;
    color:#64748b;
}

.footer a{
    color:var(--primary);
    font-weight:600;
    text-decoration:none;
}

.footer a:hover{
    text-decoration:underline;
}

/* MOBILE */
@media(max-width:480px){
    .card-box{
        padding:28px 20px;
    }
}
</style>
</head>

<body>

<div class="video-wrapper">
    <video autoplay muted loop playsinline>
        <source src="{% static 'videos/bike_login.mp4' %}" type="video/mp4">
    </video>
    <div class="video-overlay"></div>
</div>

<a href="{% url 'client_login' %}" class="back-link">
    ← Back to Login
</a>

<div class="page-container">

<div class="card-box">

    <img src="{% static 'images/logo.svg' %}" class="logo">

    <h2>Join <span>BikeHub</span></h2>
    <p class="subtitle">Create an account for digital bike servicing</p>

    <form method="post">
        {% csrf_token %}
        <input name="username" class="form-control" placeholder="Username" required>
        <input name="email" type="email" class="form-control" placeholder="Email" required>
        <input name="phone" class="form-control" placeholder="Mobile Number" required>
        <input name="password" type="password" class="form-control" placeholder="Password" required>

        <button class="btn-register" type="submit">
            Create Account
        </button>
    </form>

    <div class="footer">
        Already have an account?
        <a href="{% url 'client_login' %}">Sign In</a>
    </div>

</div>

</div>

</body>
</html>
