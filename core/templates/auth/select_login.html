{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BikeHub | Secure Access</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<style>
:root{
    --primary:#22c55e;
    --accent:#3b82f6;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

html,body{
    height:100%;
    overflow:hidden;
}

/* ===== VIDEO BACKGROUND ===== */
.video-bg{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
}

/* Overlay for readability */
.video-overlay{
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at top right, rgba(219,234,254,0.4), transparent 40%),
    radial-gradient(circle at bottom left, rgba(220,252,231,0.4), transparent 40%),
    rgba(255,255,255,0.55);
    z-index:-1;
}

/* Center Container */
.main-wrapper{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* Login Card */
.login-card{
    background:white;
    border-radius:28px;
    padding:50px 40px;
    width:100%;
    max-width:440px;
    text-align:center;
    box-shadow:0 30px 60px rgba(0,0,0,.15);
    transition:.3s ease;
}

.login-card:hover{
    transform:translateY(-6px);
}

.logo{
    width:85px;
    margin-bottom:20px;
    animation:float 4s ease-in-out infinite;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-8px);}
}

h2{
    font-weight:700;
    margin-bottom:10px;
    color:#0f172a;
}

.gradient-text{
    background:linear-gradient(90deg,#22c55e,#3b82f6);
    background-clip:text;
    -webkit-background-clip:text;
    color:transparent;
    -webkit-text-fill-color:transparent;
}

.subtitle{
    color:#64748b;
    margin-bottom:35px;
    font-size:0.95rem;
}

/* Buttons */
.btn-portal{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    width:100%;
    padding:16px;
    margin-bottom:20px;
    border-radius:16px;
    font-weight:600;
    text-decoration:none;
    transition:.3s ease;
    border:none;
}

.client-btn{
    background:linear-gradient(90deg,#22c55e,#3b82f6);
    color:white;
}

.client-btn:hover{
    transform:scale(1.05);
    box-shadow:0 12px 25px rgba(59,130,246,.3);
    color:white;
}

.employee-btn{
    background:white;
    border:1px solid #e2e8f0;
    color:#0f172a;
}

.employee-btn:hover{
    border-color:#22c55e;
    color:#22c55e;
    transform:scale(1.05);
}

.note{
    margin-top:20px;
    font-size:0.8rem;
    color:#94a3b8;
    text-transform:uppercase;
    letter-spacing:1.5px;
}

/* Mobile */
@media(max-width:480px){
    .login-card{
        padding:35px 25px;
    }
}
</style>
</head>

<body>

<!-- Background Video -->
<video class="video-bg" autoplay muted loop playsinline>
    <source src="{% static 'videos/bike_login.mp4' %}" type="video/mp4">
</video>

<div class="video-overlay"></div>

<div class="main-wrapper">

    <div class="login-card animate__animated animate__zoomIn">

        <img src="{% static 'images/logo.svg' %}" class="logo" alt="BikeHub Logo">

        <h2>Welcome to <span class="gradient-text">BikeHub</span></h2>
        <p class="subtitle">Select your portal to continue</p>

        <div class="animate__animated animate__fadeInUp animate__delay-1s">
            <a href="{% url 'client_login' %}" class="btn-portal client-btn">
                <i class="fa-solid fa-user"></i> Client Login
            </a>

            <a href="{% url 'employee_login' %}" class="btn-portal employee-btn">
                <i class="fa-solid fa-screwdriver-wrench"></i> Employee Login
            </a>
        </div>

        <div class="note animate__animated animate__fadeIn animate__delay-2s">
            <i class="fa-solid fa-shield-halved me-1"></i> Secure Authentication
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
