{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BikeHub | Password Reset Complete</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
<style>
:root{ --primary:#22c55e; --accent:#3b82f6; --light-bg:#f8fafc; }
html,body{ height:100%; margin:0; font-family:'Poppins',sans-serif; overflow:hidden; }
.video-wrapper{ position:fixed; inset:0; z-index:-2; }
.video-wrapper video{ width:100%; height:100%; object-fit:cover; filter:brightness(0.7); }
.video-overlay{ position:absolute; inset:0; background: radial-gradient(circle at top right,#dbeafe,transparent 40%), radial-gradient(circle at bottom left,#dcfce7,transparent 40%), rgba(255,255,255,0.7); }
.page-container{ position:relative; z-index:2; width:100%; height:100%; display:flex; align-items:center; justify-content:center; padding:20px; }
.login-card{ width:100%; max-width:420px; background:white; border-radius:24px; padding:40px 30px; text-align:center; box-shadow:0 30px 60px rgba(0,0,0,.15); transition:.3s ease; }
.logo{ width:60px; margin-bottom:18px; }
h2{ font-weight:700; margin-bottom:6px; }
h2 span{ background:linear-gradient(90deg,#22c55e,#3b82f6); background-clip:text; -webkit-background-clip:text; color:transparent; }
.subtitle{ font-size:14px; color:#64748b; margin-bottom:15px; }
.login-btn{ width:100%; padding:14px; border-radius:999px; border:none; font-weight:600; background:linear-gradient(90deg,#22c55e,#3b82f6); color:white; transition:.3s; text-decoration:none; display:block; }
.login-btn:hover{ transform:scale(1.05); box-shadow:0 12px 25px rgba(59,130,246,.3); color:white; }
</style>
</head>
<body>
<div class="video-wrapper">
    <video autoplay muted loop playsinline>
        <source src="{% static 'videos/bike_login.mp4' %}" type="video/mp4">
    </video>
    <div class="video-overlay"></div>
</div>
<div class="page-container">
    <div class="login-card animate__animated animate__zoomIn">
        <img src="{% static 'images/logo.svg' %}" class="logo" alt="BikeHub">
        <h2>Password <span>Reset Complete</span></h2>
        <p class="subtitle">Your password has been successfully reset. You may now log in to your account with your new password.</p>
        
        <div style="margin-top: 25px;">
            <a href="{% url 'client_login' %}" class="login-btn">Log in to Dashboard</a>
        </div>
    </div>
</div>
</body>
</html>
