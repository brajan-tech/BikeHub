{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BikeHub | My Attendance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
:root{
    --primary:#22c55e;
    --accent:#3b82f6;
    --light-bg:#f8fafc;
}

body{
    min-height:100vh;
    background:var(--light-bg);
    background-image:
        radial-gradient(circle at top right,#dbeafe,transparent 40%),
        radial-gradient(circle at bottom left,#dcfce7,transparent 40%);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Poppins',sans-serif;
    color:#0f172a;
}

/* ===== CARD ===== */
.attendance-card{
    width:100%;
    max-width:460px;
    background:white;
    border-radius:24px;
    padding:45px 36px;
    box-shadow:0 30px 60px rgba(0,0,0,.12);
    text-align:center;
}

/* ===== LOGO ===== */
.logo{
    width:60px;
    margin-bottom:18px;
}

/* ===== TITLE ===== */
.gradient-text{
    background:linear-gradient(90deg,#22c55e,#3b82f6);
    background-clip:text;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* ===== STATUS BOX ===== */
.status-box{
    background:rgba(34,197,94,.12);
    border:1px solid rgba(34,197,94,.3);
    padding:18px;
    border-radius:16px;
    color:#16a34a;
    font-weight:600;
    margin-bottom:25px;
}

/* ===== BUTTONS ===== */
.btn-checkin{
    width:100%;
    padding:15px;
    border-radius:999px;
    border:none;
    font-weight:600;
    background:linear-gradient(90deg,#22c55e,#16a34a);
    color:white;
    transition:.3s;
}

.btn-checkin:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 30px rgba(34,197,94,.3);
}

.btn-work{
    width:100%;
    padding:15px;
    border-radius:999px;
    border:none;
    font-weight:600;
    background:linear-gradient(90deg,#3b82f6,#2563eb);
    color:white;
    transition:.3s;
}

.btn-work:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 30px rgba(59,130,246,.3);
}

/* ===== BACK LINK ===== */
.back-link{
    position:absolute;
    top:25px;
    left:25px;
    color:#64748b;
    text-decoration:none;
    font-weight:500;
}

.back-link:hover{
    color:var(--primary);
}
</style>
</head>

<body>

<a href="{% url 'mechanic_dashboard' %}" class="back-link">
    <i class="bi bi-arrow-left me-1"></i> Dashboard
</a>

<div class="attendance-card">

    <!-- LOGO -->
    <img src="{% static 'images/logo.svg' %}" class="logo" alt="BikeHub">

    <!-- TITLE -->
    <h3 class="fw-bold mb-2">
        My <span class="gradient-text">Attendance</span>
    </h3>

    <p class="text-muted mb-4">
        Mark your daily check-in
    </p>

    {% if attendance.check_in %}

        <div class="status-box">
            <i class="bi bi-check-circle-fill me-2"></i>
            Checked-In at <br>
            <small>{{ attendance.check_in }}</small>
        </div>

        <a href="{% url 'mechanic_dashboard' %}">
            <button class="btn-work">
                <i class="bi bi-briefcase-fill me-2"></i>
                Go to Work Dashboard
            </button>
        </a>

    {% else %}

        <form method="post">
            {% csrf_token %}
            <button type="submit"
                    name="action"
                    value="checkin"
                    class="btn-checkin">
                <i class="bi bi-box-arrow-in-right me-2"></i>
                Check In
            </button>
        </form>

    {% endif %}

</div>

</body>
</html>
