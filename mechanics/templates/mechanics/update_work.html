{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BikeHub | Update Work</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
:root{
    --primary:#22c55e;
    --accent:#3b82f6;
    --light-bg:#f8fafc;
}

body{
    min-height:100vh;
    background:var(--light-bg);
    background-image:
        radial-gradient(circle at top right,#dbeafe,transparent 40%),
        radial-gradient(circle at bottom left,#dcfce7,transparent 40%);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Poppins',sans-serif;
    color:#0f172a;
}

/* ===== CARD ===== */
.update-card{
    width:100%;
    max-width:500px;
    background:white;
    border-radius:24px;
    padding:40px;
    box-shadow:0 30px 60px rgba(0,0,0,.12);
}

/* ===== LOGO ===== */
.logo{
    width:60px;
    display:block;
    margin:0 auto 18px;
}

/* ===== TITLE ===== */
.gradient-text{
    background:linear-gradient(90deg,#22c55e,#3b82f6);
    background-clip:text;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* ===== INFO BOX ===== */
.info-box{
    background:#f1f5f9;
    border-radius:16px;
    padding:16px;
    margin-bottom:18px;
    font-size:14px;
}

/* ===== FORM ===== */
.form-control, .form-select{
    border-radius:14px;
    padding:12px 14px;
}

.form-control:focus, .form-select:focus{
    border-color:var(--primary);
    box-shadow:0 0 0 0.2rem rgba(34,197,94,0.2);
}

/* ===== FILE UPLOAD ===== */
.custom-file-upload{
    background:#f8fafc;
    border:2px dashed rgba(34,197,94,0.5);
    border-radius:16px;
    padding:18px;
    text-align:center;
    cursor:pointer;
    transition:.3s;
}

.custom-file-upload:hover{
    background:rgba(34,197,94,0.08);
}

.custom-file-upload i{
    font-size:24px;
    color:var(--primary);
    display:block;
    margin-bottom:6px;
}

/* ===== BUTTON ===== */
.btn-update{
    width:100%;
    padding:14px;
    border-radius:999px;
    border:none;
    font-weight:600;
    background:linear-gradient(90deg,#22c55e,#3b82f6);
    color:white;
    transition:.3s;
    margin-top:15px;
}

.btn-update:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 30px rgba(59,130,246,.3);
}

/* ===== BACK LINK ===== */
.back-link{
    position:absolute;
    top:25px;
    left:25px;
    color:#64748b;
    text-decoration:none;
    font-weight:500;
}

.back-link:hover{
    color:var(--primary);
}
</style>
</head>

<body>

<a href="{% url 'mechanic_dashboard' %}" class="back-link">
    <i class="bi bi-arrow-left me-1"></i> Dashboard
</a>

<div class="update-card">

    <!-- LOGO -->
    <img src="{% static 'images/logo.svg' %}" class="logo" alt="BikeHub">

    <!-- TITLE -->
    <h3 class="text-center fw-bold mb-2">
        Update <span class="gradient-text">Work</span>
    </h3>

    <p class="text-center text-muted mb-4">
        Service progress & completion
    </p>

    <!-- Service Info -->
    <div class="info-box">
        <strong><i class="bi bi-bicycle me-1"></i> Bike:</strong><br>
        {{ service.bike }}
    </div>

    <div class="info-box">
        <strong><i class="bi bi-exclamation-circle me-1"></i> Problem:</strong><br>
        {{ service.problem_description }}
    </div>

    <!-- Form -->
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Status</label>
            <select name="status" class="form-select" required>
                <option value="in_progress">In Progress</option>
                <option value="completed">Completed</option>
            </select>
        </div>

        <!-- Upload -->
        <div class="custom-file-upload">
            <label for="workPhoto">
                <i class="bi bi-camera"></i>
                <span id="fileLabel">Take / Upload work photo (optional)</span>
            </label>

            <input
                type="file"
                name="work_photo"
                id="workPhoto"
                accept="image/*"
                capture="environment"
                hidden
            >

            <img id="photoPreview"
                 style="display:none; margin-top:14px; width:100%; border-radius:14px;
                        box-shadow:0 10px 25px rgba(0,0,0,0.1);">
        </div>

        <button type="submit" class="btn-update">
            <i class="bi bi-check-circle me-2"></i>
            Update Work
        </button>
    </form>

</div>

<script>
const input = document.getElementById("workPhoto");
const label = document.getElementById("fileLabel");
const preview = document.getElementById("photoPreview");

const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");

input.addEventListener("change", function () {
    if (!this.files || !this.files[0]) return;

    const file = this.files[0];
    label.textContent = file.name;

    const img = new Image();
    img.onload = function () {
        canvas.width = img.width;
        canvas.height = img.height;

        ctx.drawImage(img, 0, 0);

        const now = new Date().toLocaleString();
        ctx.font = `${Math.max(img.width / 35, 22)}px Poppins`;
        ctx.fillStyle = "rgba(255,255,255,0.85)";
        ctx.textAlign = "right";
        ctx.fillText(now, canvas.width - 20, canvas.height - 20);

        canvas.toBlob(blob => {
            const watermarkedFile = new File([blob], file.name, { type: file.type });

            const dataTransfer = new DataTransfer();
            dataTransfer.items.add(watermarkedFile);
            input.files = dataTransfer.files;

            preview.src = URL.createObjectURL(watermarkedFile);
            preview.style.display = "block";
        });
    };

    img.src = URL.createObjectURL(file);
});
</script>

</body>
</html>
